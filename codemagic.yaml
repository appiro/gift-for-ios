workflows:
  ios-workflow:
    name: Gift for iOS
    max_build_duration: 60
    integrations:
      app_store_connect: giftfor
    environment:
      groups:
        - signing
      xcode: latest
      node: v22
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: capacitor-app
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          echo "$CERTIFICATE_PRIVATE_KEY" | base64 --decode > /tmp/certificate_key.pem
          app-store-connect fetch-signing-files info.giftfor \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/certificate_key.pem \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
