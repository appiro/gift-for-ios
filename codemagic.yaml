workflows:
  ios-workflow:
    name: Gift for iOS
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install CocoaPods dependencies
        script: |
          cd ios/src
          pod install
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/src/Gift for.xcworkspace" \
            --scheme "Gift for"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
