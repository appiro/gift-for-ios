workflows:
  ios-workflow:
    name: Gift for iOS
    max_build_duration: 60
    integrations:
      app_store_connect: giftfor
    environment:
      groups:
        - signing
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          echo "$CERTIFICATE_PRIVATE_KEY" | base64 --decode > /tmp/certificate_key.pem
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 --decode > /tmp/asc_key.p8
          app-store-connect fetch-signing-files info.giftfor \
            --issuer-id "88cb163c-5d50-4791-8ed6-e869b4c7815a" \
            --key-id "P957U9932H" \
            --private-key @file:/tmp/asc_key.p8 \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/certificate_key.pem \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Install CocoaPods
        script: cd src && pod install
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "src/Gift for.xcworkspace" \
            --scheme "Gift for"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
