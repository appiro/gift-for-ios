workflows:
  ios-workflow:
    name: Gift for iOS
    max_build_duration: 60
    environment:
      xcode: latest
      node: v22
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: capacitor-app
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
