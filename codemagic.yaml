workflows:
  ios-workflow:
    name: Gift for iOS
    max_build_duration: 60
    integrations:
      app_store_connect: giftfor
    environment:
      groups:
        - ios_credentials
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files info.giftfor \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Install CocoaPods
        script: cd src && pod install
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "src/Gift for.xcworkspace" \
            --scheme "Gift for"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
